<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fidelity KCSC | Contact Us</title>
    <link rel="icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
            background: #f5f9ff;
        }

        .full-width-header {
            width: 100%;
            background: transparent;
        }
        .full-width-footer {
            width: 100%;
            background: transparent;
        }

        .page-container {
            max-width: 70%;
            margin: 2rem auto 3rem auto;
            width: 100%;
        }

        .stacked-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-info {
            background: white;
            padding: 2rem 2rem 1.8rem;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #e9eef3;
            transition: all 0.2s;
        }

        .contact-form {
            background: white;
            padding: 2rem 2rem 2.5rem;
            border-radius: 20px;
            border: 1px solid #e9eef3;
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.06);
        }

        .info-item {
            margin: 1.5rem 0;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-item h3 {
            color: #1a3c5c;
            margin-bottom: 0.6rem;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-item p, .info-item address {
            font-style: normal;
            color: #2d3e50;
            line-height: 1.6;
        }
        .contact-details-line {
            margin: 0.4rem 0;
        }

        .contact-info h2, .contact-form h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f2b40;
            margin-bottom: 1rem;
            letter-spacing: -0.3px;
            border-left: 5px solid #1a3c5c;
            padding-left: 1rem;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .form-row label {
            width: 160px;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: #fff;
            font-family: inherit;
        }

        .form-row input:focus,
        .form-row select:focus,
        textarea:focus {
            outline: none;
            border-color: #1a3c5c;
            box-shadow: 0 0 0 3px rgba(26, 60, 92, 0.12);
        }

        .phone-group {
            display: flex;
            gap: 0.8rem;
            flex: 1;
        }

        .custom-select-wrapper {
            position: relative;
            width: 180px;
        }

        .custom-select-trigger {
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px 36px 12px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            position: relative;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .custom-select-trigger::after {
            content: "▼";
            font-size: 11px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.2s;
            color: #5b6e8c;
        }

        .custom-select-trigger.open::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .custom-dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2edf7;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            z-index: 1000;
            max-height: 280px;
            overflow-y: auto;
            display: none;
        }

        .custom-dropdown.show {
            display: block;
        }

        .dropdown-search {
            padding: 10px 14px;
            border-bottom: 1px solid #edf2f9;
            position: sticky;
            top: 0;
            background: white;
            border-radius: 20px 20px 0 0;
        }

        .dropdown-search input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .country-option {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
        }

        .country-option:hover {
            background: #eef3fc;
        }

        .country-code-part {
            color: #2c5a7a;
            font-weight: 500;
        }

        #phone {
            flex: 1;
        }

        .message-group {
            position: relative;
            width: 100%;
            margin-top: 8px;
        }
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
            resize: vertical;
        }
        .char-counter {
            position: absolute;
            bottom: 14px;
            right: 18px;
            font-size: 12px;
            background: rgba(255,255,255,0.9);
            padding: 2px 12px;
            border-radius: 50px;
            color: #475569;
            font-weight: 500;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        button {
            width: 100%;
            background: #1a3c5c;
            color: white;
            padding: 14px 18px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        button:hover {
            background: #0f2c46;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(26,60,92,0.25);
        }

        .required:after {
            content: " *";
            color: #dc2626;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .page-container { max-width: 92%; margin: 1rem auto; }
            .form-row { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .form-row label { width: 100%; }
            .phone-group { flex-direction: column; width: 100%; }
            .custom-select-wrapper { width: 100%; }
        }
    </style>

        const sortedCountries = [...fullCountryList].sort((a,b) => a.name.localeCompare(b.name));

        function buildDropdown() {
            const trigger = document.getElementById("countryTrigger");
            const dropdown = document.getElementById("customDropdown");
            const search = document.getElementById("countrySearchInput");
            const optsDiv = document.getElementById("countryOptions");
            const hiddenCode = document.getElementById("selectedCountryCodeHidden");

            function render(filter=""){
                optsDiv.innerHTML = "";
                const filtered = sortedCountries.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()) || c.code.includes(filter));
                filtered.forEach(c => {
                    const div = document.createElement("div");
                    div.className = "country-option";
                    div.innerHTML = `<span>${c.name}</span><span class="country-code-part">${c.code}</span>`;
                    div.onclick = () => { trigger.innerHTML = `${c.name} ${c.code}`; hiddenCode.value = c.code; dropdown.classList.remove("show"); };
                    optsDiv.appendChild(div);
                });
            }

            function setCountry(isoCode) {
                const match = sortedCountries.find(c => c.iso === isoCode) || sortedCountries.find(c => c.iso === "US") || sortedCountries[0];
                trigger.innerHTML = `${match.name} ${match.code}`;
                hiddenCode.value = match.code;
            }

            // Auto-detect user's country via IP geolocation; fall back to US on any error
            fetch("https://ipapi.co/json/")
                .then(r => r.json())
                .then(data => setCountry(data.country_code || "US"))
                .catch(() => setCountry("US"));

            search.addEventListener("input", e => render(e.target.value));
            trigger.addEventListener("click", e => { e.stopPropagation(); dropdown.classList.toggle("show"); if(dropdown.classList.contains("show")) render(""); });
            document.addEventListener("click", e => { if(!trigger.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove("show"); });
        }

        function initCounter() {
            const ta = document.getElementById("messageInput");
            const span = document.getElementById("charCounterSpan");
            ta.addEventListener("input", () => span.innerText = `${ta.value.length}/2000`);
        }

        function loadHeaderFooter() {
            fetch('/header.html').then(r => r.text()).then(data => document.getElementById('header-placeholder').innerHTML = data).catch(() => {});
            fetch('/footer.html').then(r => r.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data).catch(() => {});
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadHeaderFooter();
            buildDropdown();
            initCounter();

            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqmlVESbwhA-cuAgKMfSiQN2wXGd5Puy_b48_0Bo1D6Nbslo6FZ8wsXY-NwfHZg8g/exec";

            document.getElementById("contactForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const btn = document.getElementById("submitBtn");
                btn.disabled = true;
                btn.textContent = "Sending…";

                fetch(SCRIPT_URL, { method: "POST", body: new FormData(this) })
                    .then(res => res.json())
                    .then(data => {
                        if (data.result === "success") {
                            window.location.href = "/thank-you.html";
                        } else {
                            btn.disabled = false;
                            btn.textContent = "Send Inquiry →";
                            alert("Submission failed. Please try again.");
                        }
                    })
                    .catch(() => {
                        btn.disabled = false;
                        btn.textContent = "Send Inquiry →";
                        alert("Network error. Please check your connection and try again.");
                    });
            });
        });

                                    <div id="countryOptions"></div>
                                </div>
                                <input type="hidden" id="selectedCountryCodeHidden" name="country_code">
                            </div>
                            <input id="phone" type="tel" name="phone" placeholder="Phone number" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="required">Select Topic</label>
                        <select name="inquiry-topic" required>
                            <option value="" disabled selected>— Select topic —</option>
                            <option>📦 Product Sourcing Request (RFQ)</option>
                            <option>📄 Offer Submission (SCO / FCO)</option>
                            <option>🤝 Partnership & Collaboration</option>
                            <option>💡 General Trade Inquiry</option>
                        </select>
                    </div>
                    <label class="required">Message</label>
                    <div class="message-group">
                        <textarea id="messageInput" name="message" rows="5" maxlength="2000" required></textarea>
                        <span id="charCounterSpan" class="char-counter">0/2000</span>
                    </div>
                    <button type="submit" id="submitBtn">Send Inquiry →</button>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder" class="full-width-footer"></div>
</body>
</html>
