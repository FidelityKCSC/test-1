<!DOCTYPE html>
<html lang="en">
<head>
  <title>Thank You | Fidelity KCSC</title>
  <link rel="icon" href="/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #eef4fb 0%, #f8fbff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #1c2e3e;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    .card {
      background: #ffffff;
      padding: 42px 34px;
      border-radius: 20px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.07);
      border: 1px solid #e6edf3;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #1a3c5c, #3a6f9b);
    }

    .icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #e6f6ec;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }

    .icon svg {
      width: 38px;
      height: 38px;
      stroke: #1f9d55;
      stroke-width: 3.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-title {
      font-size: 1.75rem;
      font-weight: 500;
      color: #0f2b40;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
    }

    .main-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a3c5c;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 1rem;
      color: #546e7a;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .divider {
      height: 1px;
      background: #e6edf3;
      margin: 18px 0;
    }

    .info {
      font-size: 0.9rem;
      color: #5f7485;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .btn-primary {
      background: #1a3c5c;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      transition: all 0.25s ease;
      display: inline-block;
    }

    .btn-primary:hover {
      background: #0f2c46;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(26, 60, 92, 0.22);
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #8aa0b2;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 22px;
      }

      .brand-title {
        font-size: 1.5rem;
      }

      .main-title {
        font-size: 1.1rem;
      }
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7"></path>
        </svg>
      </div>

      <h1 class="brand-title">Fidelity KCSC</h1>

      <h2 class="main-title">Inquiry Successfully Submitted</h2>

      <p class="subtitle">
        Thank you for contacting Fidelity KCSC.<br>
        Your inquiry has been received and is now under review.<br>
        Our team will respond shortly.
      </p>

      <div class="divider"></div>

      <p class="info">
        Please ensure your contact details are accurate and accessible.
      </p>

      <a href="https://fidelitykcsc.pages.dev" class="btn-primary">
        Return to Website
      </a>

      <div class="footer-note">
        © Fidelity KCSC — Global Trade
      </div>

    </div>
  </div>
</body>
</html>
